<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тауарлар | Азық-түлік Дүкен</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Poppins', sans-serif;
            line-height: 1.6;
            color: #2d3748;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(20px);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 20px;
        }

        header h1 {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        header h1 i {
            font-size: 2.2rem;
            background: rgba(255,255,255,0.25);
            padding: 10px;
            border-radius: 16px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        nav a {
            color: rgba(255,255,255,0.95);
            text-decoration: none;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 30px;
            transition: all 0.3s ease;
            position: relative;
        }

        nav a:hover, nav a.active {
            color: white;
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
        }

        /* Cart Header */
        .cart-header {
            position: fixed;
            top: 80px;
            right: 20px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 1.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 2px solid rgba(16, 185, 129, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cart-header:hover {
            transform: scale(1.05);
            box-shadow: 0 25px 50px rgba(16,185,129,0.3);
            border-color: #10b981;
        }

        .cart-count {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Main Content */
        .main-content {
            padding-top: 140px;
            padding-bottom: 100px;
        }

        /* Hero Banner */
        .hero-banner {
            background: linear-gradient(135deg, #10b981 0%, #059669 50%, #047857 100%);
            color: white;
            padding: 5rem 0;
            text-align: center;
            position: relative;
            border-radius: 0 0 40px 40px;
            overflow: hidden;
            margin-bottom: 3rem;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1.2rem;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .hero-subtitle {
            font-size: 1.4rem;
            max-width: 700px;
            margin: 0 auto 2.5rem;
        }

        /* Controls */
        .controls {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 30px;
            margin: 2rem 0;
            box-shadow: 0 25px 60px rgba(16,185,129,0.15);
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: center;
            border: 2px solid rgba(16, 185, 129, 0.2);
        }

        .search-wrapper {
            flex: 1;
            min-width: 350px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 18px 20px 18px 60px;
            border: 3px solid #dcfce7;
            border-radius: 25px;
            font-size: 1.1rem;
            background: #f0fdf4;
            transition: all 0.4s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 5px rgba(16, 185, 129, 0.15);
            background: white;
            transform: scale(1.02);
        }

        .search-icon {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: #10b981;
            font-size: 1.3rem;
        }

        .filter-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.4s ease;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        .filter-btn:hover, .filter-btn.active {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.4);
        }

        .sort-select {
            padding: 15px 20px;
            border: 3px solid #dcfce7;
            border-radius: 25px;
            background: #f0fdf4;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            color: #166534;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2.5rem;
            margin-bottom: 5rem;
        }

        .product-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.1);
            transition: all 0.5s ease;
            border: 2px solid rgba(16, 185, 129, 0.2);
            position: relative;
            height: 520px;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-20px) scale(1.02);
            box-shadow: 0 50px 100px rgba(16,185,129,0.25);
            border-color: #10b981;
        }

        .product-image {
            height: 250px;
            position: relative;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-image img {
            transform: scale(1.1);
        }

        .product-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 700;
            z-index: 3;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .product-info {
            padding: 2.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-category {
            color: #10b981;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1rem;
        }

        .product-name {
            font-size: 1.6rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 1rem;
            line-height: 1.3;
            flex-grow: 1;
        }

        .product-price-section {
            margin-bottom: 1.5rem;
        }

        .product-price {
            font-size: 2.2rem;
            font-weight: 800;
            color: #10b981;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 4px rgba(16,185,129,0.3);
        }

        .product-stock {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #059669;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .product-actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 15px 35px rgba(16, 185, 129, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 25px 50px rgba(16, 185, 129, 0.6);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 15px 35px rgba(34, 197, 94, 0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 25px 50px rgba(34, 197, 94, 0.6);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f87171, #ef4444);
            color: white;
            box-shadow: 0 15px 35px rgba(248, 113, 113, 0.4);
            flex: 0.3;
        }

        .btn-danger:hover {
            transform: translateY(-8px) scale(1.1);
            box-shadow: 0 25px 50px rgba(248, 113, 113, 0.6);
        }

        /* Cart Modal */
        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .cart-content {
            background: white;
            border-radius: 30px;
            max-width: 600px;
            max-height: 90vh;
            width: 100%;
            overflow-y: auto;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            border: 4px solid rgba(16, 185, 129, 0.3);
            transform: scale(0.9);
            animation: cartSlideIn 0.4s ease forwards;
        }

        @keyframes cartSlideIn {
            to { transform: scale(1); }
        }

        .cart-header-modal {
            padding: 2.5rem;
            border-bottom: 4px solid #10b981;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #f0fdf4, #dcfce7);
        }

        .cart-items-list {
            padding: 0 2.5rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .cart-total {
            padding: 2.5rem;
            border-top: 4px solid #10b981;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 2rem;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .product-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1><i class="fas fa-store-alt"></i>Азық-түлік Дүкен</h1>
            <nav>
                <ul>
                    <li><a href="index.html"><i class="fas fa-home"></i> Басты</a></li>
                    <li><a href="products.html" class="active"><i class="fas fa-boxes"></i> Тауарлар</a></li>
                    <li><a href="sales.html"><i class="fas fa-shopping-cart"></i> Сату</a></li>
                    <li><a href="report.html"><i class="fas fa-chart-bar"></i> Есеп</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="cart-header" id="cartHeader">
        <i class="fas fa-shopping-cart" style="font-size: 1.5rem; color: #10b981;"></i>
        <span>Себет</span>
        <div class="cart-count" id="cartCount">0</div>
    </div>

    <div class="main-content">
        <section class="hero-banner">
            <div class="container">
                <h2 class="hero-title">Толық ассортимент</h2>
                <p class="hero-subtitle">Сүт, нан, ет, жеміс, сусын, гигиена - барлығы бар! Барлық тауарлар стокта!</p>
            </div>
        </section>

        <div class="container">
            <div class="controls">
                <div class="search-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" placeholder="Шаңғымақ, Сүт, Май... іздеңіз" id="searchInput">
                </div>
                <select class="sort-select" id="sortSelect">
                    <option value="new">Жаңа келген</option>
                    <option value="price-asc">Бағасы бойынша (өсу)</option>
                    <option value="price-desc">Бағасы бойынша (түсу)</option>
                    <option value="popular">Халықаралық хит</option>
                </select>
                <button class="filter-btn active" data-category="all">Барлығы</button>
                <button class="filter-btn" data-category="food">Тамақ</button>
                <button class="filter-btn" data-category="drink">Сусын</button>
                <button class="filter-btn" data-category="hygiene">Гигиена</button>
            </div>

            <div class="products-grid" id="productsGrid"></div>
        </div>
    </div>

    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-header-modal">
                <h3><i class="fas fa-shopping-basket"></i> Себет (<span id="modalCartCount">0</span>)</h3>
                <button class="btn btn-danger" onclick="closeCart()">Жабу <i class="fas fa-times"></i></button>
            </div>
            <div class="cart-items-list" id="cartItemsList"></div>
            <div class="cart-total">
                <div style="display: flex; justify-content: space-between; font-size: 2rem; font-weight: 800; margin-bottom: 2rem; color: #10b981;">
                    <span>Жалпы:</span>
                    <span id="cartTotal">0 ₸</span>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button class="btn btn-danger" onclick="clearCart()" style="flex: 1;">Тазалау</button>
                    <button class="btn btn-primary" onclick="checkout()" style="flex: 2; font-size: 1.3rem; padding: 20px;">
                        <i class="fas fa-credit-card"></i> Төлем жасау
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ✅ ШЫНАЙЫ ФОТОЛАР  КЕСІЛГЕН, ТОЛЫҚ ӨЛШЕМДІ ФОТОЛАР
        const products = [
 {id:1, name:"Сүт 2.5% 1л", category:"food", price:450, stock:127, badge:"Хит",
 image:"https://images.unsplash.com/photo-1563636619-e9143da7973b"},

 {id:2, name:"Нан ақ 500г", category:"food", price:290, stock:89, badge:"Акция",
 image:"https://images.unsplash.com/photo-1608198093002-ad4e005484ec"},

 {id:3, name:"Ұн 1кг", category:"food", price:1280, stock:45, badge:"Жаңа",
 image:"https://avatars.mds.yandex.net/get-mpic/5131700/2a00000193506aa5389207a6856a2671fe17/orig"},

 {id:4, name:"Бадам майы 1л", category:"food", price:1560, stock:32, badge:"-15%",
 image:"https://s.alicdn.com/@sc04/kf/H23d0fb20f999463699892df6677db23dd.jpg"},

 {id:5, name:"Coca-Cola 2л", category:"drink", price:890, stock:76, badge:"Хит",
 image:"https://ir.ozone.ru/s3/multimedia-a/6698713798.jpg"},

 {id:6, name:"Sprite 1.5л", category:"drink", price:720, stock:54, badge:"Сток",
 image:"https://ir-3.ozone.ru/s3/multimedia-n/w1200/6775786355.jpg"},

 {id:7, name:"Ariel 3кг", category:"hygiene", price:4780, stock:18, badge:"Хит",
 image:"https://basket-22.wbbasket.ru/vol3770/part377064/377064965/images/big/1.webp"},

 {id:8, name:"Күрт 5% 1кг", category:"food", price:1280, stock:67, badge:"Жаңа",
 image:"https://images.satu.kz/218407580_w700_h500_kopchenyj-kishi-qurt.jpg"},

 {id:9, name:"Вода 0.5л", category:"drink", price:180, stock:234, badge:"Сток",
 image:"https://images.unsplash.com/photo-1523362628745-0c100150b504"},

 {id:10, name:"Күріш 1кг", category:"food", price:780, stock:112, badge:"Хит",
 image:"https://images.unsplash.com/photo-1586201375761-83865001e31c"}
];

        let cart = [];
        let filteredProducts = [...products];
        let currentSort = 'new';

        renderProducts(products);

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filterProducts();
            });
        });

        document.getElementById('searchInput').addEventListener('input', filterProducts);
        document.getElementById('sortSelect').addEventListener('change', (e) => {
            currentSort = e.target.value;
            filterProducts();
        });

        function filterProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const activeCategory = document.querySelector('.filter-btn.active').dataset.category;

            filteredProducts = products.filter(product => {
                const matchesSearch = product.name.toLowerCase().includes(query);
                const matchesCategory = activeCategory === 'all' || product.category === activeCategory;
                return matchesSearch && matchesCategory;
            }).sort((a, b) => {
                switch(currentSort) {
                    case 'price-asc': return a.price - b.price;
                    case 'price-desc': return b.price - a.price;
                    case 'popular': return b.stock - a.stock;
                    default: return 0;
                }
            });

            renderProducts(filteredProducts);
        }

        function renderProducts(productsToShow) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = productsToShow.slice(0, 12).map(product => `
                <div class="product-card" data-id="${product.id}">
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}" 
                             onerror="this.src='https://images.unsplash.com/photo-1579124221191-6b3d6a1f5818?w=800&h=600&fit=crop'">
                        ${product.badge ? `<div class="product-badge">${product.badge}</div>` : ''}
                    </div>
                    <div class="product-info">
                        <div class="product-category">${getCategoryName(product.category)}</div>
                        <h3 class="product-name">${product.name}</h3>
                        <div class="product-price-section">
                            <div class="product-price">${product.price.toLocaleString()} ₸</div>
                        </div>
                        <div class="product-stock">
                            <i class="fas fa-check-circle"></i>
                            <span>Стокта: ${product.stock} дана</span>
                        </div>
                        <div class="product-actions">
                            <button class="btn btn-primary" onclick="addToCart(${product.id})">
                                <i class="fas fa-shopping-cart"></i> Себетке
                            </button>
                            <button class="btn btn-secondary" onclick="quickBuy(${product.id})">
                                <i class="fas fa-bolt"></i> Тез сатып
                            </button>
                            <button class="btn btn-danger" onclick="removeStock(${product.id})" title="Қойманы азайту">
                                <i class="fas fa-minus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getCategoryName(cat) {
            const names = {food:'Тамақ', drink:'Сусын', hygiene:'Гигиена'};
            return names[cat] || cat;
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({...product, quantity: 1});
            }
            
            updateCartDisplay();
            showNotification(`${product.name} қосылды! ✅`);
        }

        function quickBuy(productId) {
            const product = products.find(p => p.id === productId);
            cart = [{...product, quantity: 1}];
            updateCartDisplay();
            openCart();
            showNotification(`${product.name} тез сатып алынды! ⚡`);
        }

        function updateCartDisplay() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
            document.getElementById('modalCartCount').textContent = count;
        }

        function openCart() {
            document.getElementById('cartModal').style.display = 'flex';
            renderCartItems();
        }

        function closeCart() {
            document.getElementById('cartModal').style.display = 'none';
        }

        function renderCartItems() {
            const container = document.getElementById('cartItemsList');
            if (cart.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:3rem;color:#a0aec0;"><i class="fas fa-shopping-basket" style="font-size:4rem;margin-bottom:1rem;opacity:0.5;"></i><h3>Себет бос</h3></div>';
            } else {
                container.innerHTML = cart.map(item => `
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:1.5rem 0;border-bottom:1px solid #e2e8f0;">
                    <div>
                        <h4 style="margin-bottom:0.5rem;">${item.name}</h4>
                        <div style="color:#10b981;font-weight:600;">${item.price.toLocaleString()} ₸ × ${item.quantity}</div>
                    </div>
                    <div style="display:flex;align-items:center;gap:1rem;">
                        <button onclick="changeQuantity(${item.id}, -1)" class="btn" style="padding:10px 15px;font-size:1.2rem;background:#f0f9ff;color:#10b981;">−</button>
                        <span style="font-weight:700;font-size:1.2rem;">${item.quantity}</span>
                        <button onclick="changeQuantity(${item.id}, 1)" class="btn" style="padding:10px 15px;font-size:1.2rem;background:#10b981;color:white;">+</button>
                        <button onclick="removeFromCart(${item.id})" style="background:#f87171;color:white;padding:10px;border-radius:10px;border:none;cursor:pointer;"><i class="fas fa-trash"></i></button>
                    </div>
                    </div>
                `).join('');
            }
            document.getElementById('cartTotal').textContent = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0).toLocaleString() + ' ₸';
        }

        function changeQuantity(id, delta) {
            const item = cart.find(item => item.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(id);
                } else {
                    renderCartItems();
                    updateCartDisplay();
                }
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            renderCartItems();
            updateCartDisplay();
        }

        function clearCart() {
            cart = [];
            renderCartItems();
            updateCartDisplay();
        }

        function checkout() {
            if (cart.length === 0) {
                alert('Себет бос!');
                return;
            }
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            alert(`✅ Төлем сәтті! Жалпы сомасы: ${total.toLocaleString()} ₸\nРахмет клиентке! 🎉`);
            cart = [];
            closeCart();
            updateCartDisplay();
        }

        function removeStock(id) {
            const product = products.find(p => p.id === id);
            if (product.stock > 0) {
                product.stock--;
                renderProducts(filteredProducts);
                showNotification(`${product.name} стоктан 1 дана азайтылды`);
            } else {
                showNotification('❌ Стокта жоқ!');
            }
        }

        document.getElementById('cartHeader').addEventListener('click', openCart);

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 120px;
                right: 20px;
                background: linear-gradient(135deg, #10b981, #059669);
                color: white;
                padding: 20px 30px;
                border-radius: 20px;
                box-shadow: 0 20px 50px rgba(16,185,129,0.4);
                z-index: 4000;
                font-weight: 600;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        document.getElementById('cartModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('cartModal')) closeCart();
        });
    </script>
</body>
</html>
