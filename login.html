<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кіру | Азық-түлік Магазины</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Poppins', sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #059669 50%, #047857 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgdmlld0JveD0iMCAwIDEwMCAxMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxjaXJjbGUgY3g9IjUwIiBjeT0iMjUiIHI9IjgiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4xKSIvPgo8Y2lyY2xlIGN4PSIyNSIgY3k9IjQwIiByPSI2IiBmaWxsPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMDgpIi8+CjxjaXJjbGUgY3g9Ijc1IiBjeT0iNDUiIHI9IjUiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4xKSIvPgo8L3N2Zz4K') repeat;
            animation: floatFood 20s linear infinite;
            z-index: 1;
        }

        @keyframes floatFood {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            padding: 4rem 3rem;
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
            border: 3px solid rgba(16, 185, 129, 0.3);
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 10;
            animation: slideIn 0.8s ease-out;
            transform: scale(0.9);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 1.5rem;
        }

        .login-logo i {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 20px;
            border-radius: 25px;
            color: white;
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.4);
        }

        .login-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: #64748b;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .form-group {
            position: relative;
            margin-bottom: 2rem;
        }

        .form-input {
            width: 100%;
            padding: 20px 25px 20px 70px;
            border: 3px solid #dcfce7;
            border-radius: 25px;
            font-size: 1.1rem;
            background: #f8fafc;
            transition: all 0.4s ease;
            font-family: 'Inter', sans-serif;
        }

        .form-input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 5px rgba(16, 185, 129, 0.15);
            background: white;
            transform: translateY(-3px);
        }

        .form-icon {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: #10b981;
            font-size: 1.4rem;
            z-index: 2;
        }

        .login-btn {
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.4);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 30px 60px rgba(16, 185, 129, 0.6);
        }

        .login-btn:active {
            transform: translateY(-4px) scale(1.02);
        }

        .demo-info {
            text-align: center;
            margin-top: 2rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, #f0fdf4, #dcfce7);
            border-radius: 20px;
            border: 2px solid #dcfce7;
        }

        .demo-info h4 {
            color: #166534;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .demo-credentials {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            font-size: 1.1rem;
        }

        .demo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #059669;
            font-weight: 600;
        }

        .demo-item i {
            color: #10b981;
            font-size: 1.2rem;
        }

        .error-message {
            background: linear-gradient(135deg, #fef2f2, #fee2e2);
            color: #dc2626;
            padding: 1rem 1.5rem;
            border-radius: 15px;
            border-left: 5px solid #ef4444;
            margin-bottom: 1.5rem;
            display: none;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(16, 185, 129, 0.95);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            flex-direction: column;
            text-align: center;
            color: white;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .success-content {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            padding: 4rem 3rem;
            border-radius: 30px;
            border: 2px solid rgba(255,255,255,0.3);
            transform: scale(0.8);
            animation: successPop 0.6s ease forwards;
        }

        @keyframes successPop {
            to { transform: scale(1); }
        }

        .success-icon {
            font-size: 6rem;
            margin-bottom: 2rem;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        .success-title {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 1rem;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .success-text {
            font-size: 1.3rem;
            margin-bottom: 3rem;
        }

        .go-to-shop {
            background: white;
            color: #10b981;
            padding: 18px 40px;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .go-to-shop:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 1rem;
                padding: 2.5rem 2rem;
            }
            
            .login-title {
                font-size: 2rem;
            }
            
            .login-logo i {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Сәтті кіру экраны -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-content">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <div class="success-title">Сәтті кіру! ✅</div>
            <div class="success-text">Дамуыңызға қош келдіңіз, администратор!</div>
            <a href="products.html" class="go-to-shop">
                <i class="fas fa-store"></i> Тауарларға өту
            </a>
        </div>
    </div>

    <!-- Негізгі логин формасы -->
    <div class="login-container">
        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-triangle"></i>
            Логин немесе пароль қате!
        </div>
        
        <div class="login-header">
            <div class="login-logo">
                <i class="fas fa-store-alt"></i>
                <h1 class="login-title">Азық-түлік Магазины</h1>
            </div>
            <p class="login-subtitle">Админ панеліне кіру</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <i class="fas fa-user form-icon"></i>
                <input type="text" class="form-input" id="username" placeholder="Логин" required>
            </div>
            
            <div class="form-group">
                <i class="fas fa-lock form-icon"></i>
                <input type="password" class="form-input" id="password" placeholder="Пароль" required>
            </div>
            
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i>
                Кіру
            </button>
        </form>

        <!-- Демо мәліметтері -->
        <div class="demo-info">
            <h4><i class="fas fa-info-circle"></i> Тест үшін:</h4>
            <div class="demo-credentials">
                <div class="demo-item">
                    <i class="fas fa-user"></i>
                    <span>admin</span>
                </div>
                <div class="demo-item">
                    <i class="fas fa-lock"></i>
                    <span>123456</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const successOverlay = document.getElementById('successOverlay');
            
            // Демо логиндер
            const validLogins = {
                'admin': '123456',
                'Админ': 'admin123',
                'manager': 'manager2026'
            };
            
            if (validLogins[username] && validLogins[username] === password) {
                // Сәтті кіру
                document.body.style.overflow = 'hidden';
                successOverlay.style.display = 'flex';
                
                // 3 секундтан кейін products.html-ге бағыттау
                setTimeout(() => {
                    window.location.href = 'products.html';
                }, 2500);
                
            } else {
                // Қате логин
                errorMessage.style.display = 'block';
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 4000);
                
                // Шығарылған тербеліспен
                document.getElementById('loginForm').style.animation = 'shake 0.5s ease-in-out';
                setTimeout(() => {
                    document.getElementById('loginForm').style.animation = '';
                }, 500);
            }
        });

        // Enter басқанда кіру
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });

        // Input фокус кезінде қате жасыру
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', () => {
                document.getElementById('errorMessage').style.display = 'none';
            });
        });
    </script>
</body>
</html>
